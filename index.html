<script>

  document.addEventListener("DOMContentLoaded", function() {
    const savedVersion = localStorage.getItem("siteVersion");
    const overlay = document.getElementById("versionSelectOverlay");

    if (savedVersion === "desktop") {
      overlay.style.display = "none";
    } else if (savedVersion === "mobile") {
      window.location.href = "index-mobile.html";
    }
  });

  function chooseVersion(version) {
    localStorage.setItem("siteVersion", version);
    if (version === "mobile") {
      window.location.href = "index-mobile.html";
    } else if (version === "desktop") {
      document.getElementById("versionSelectOverlay").style.display = "none";
    }
  }
