<script>
function loadArticle(url) {
  const frame = document.getElementById("previewFrame");
  if (frame) {
    frame.src = url;
  }
}

function filterArticles(category, linkElement) {
  const articles = document.querySelectorAll('.article-item');
  const label = document.getElementById('newestEntriesLabel');

  articles.forEach(article => {
    const articleCategory = article.getAttribute('data-category');
    if (category === 'all' || articleCategory === category) {
      article.style.display = 'block';
    } else {
      article.style.display = 'none';
    }
  });

  const filterLinks = document.querySelectorAll('.category-filter a');
  filterLinks.forEach(link => link.classList.remove('active-filter'));
  if (linkElement) linkElement.classList.add('active-filter');

  // Pokaż napis tylko dla "all"
  if (category === 'all') {
    label.style.display = 'block';
  } else {
    label.style.display = 'none';
  }
}

document.addEventListener("DOMContentLoaded", () => {
  const container = document.querySelector('.article-list');
  const articles = Array.from(container.querySelectorAll('.article-item'));

  articles.sort((a, b) => {
    const dateA = new Date(a.querySelector('.article-meta').textContent.trim().split('.').reverse().join('-'));
    const dateB = new Date(b.querySelector('.article-meta').textContent.trim().split('.').reverse().join('-'));
    return dateB - dateA;
  });

  container.innerHTML = '';
  articles.forEach(article => container.appendChild(article));
});
  
  document.addEventListener("DOMContentLoaded", () => {
  const container = document.querySelector('.article-list');
  const articles = Array.from(container.querySelectorAll('.article-item'));

  articles.sort((a, b) => {
    const dateA = new Date(a.querySelector('.article-meta').textContent.trim().split('.').reverse().join('-'));
    const dateB = new Date(b.querySelector('.article-meta').textContent.trim().split('.').reverse().join('-'));
    return dateB - dateA;
  });

  container.innerHTML = '';
  articles.forEach(article => container.appendChild(article));

  // Pokaż napis "newest entries" na starcie
  document.getElementById('newestEntriesLabel').style.display = 'block';
});

</script>
